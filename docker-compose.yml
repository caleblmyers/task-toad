services:
  db:
    image: postgres:16
    container_name: tasktoad-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasktoad
    ports:
      - "5432:5432"
    volumes:
      - tasktoad_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Full self-hosted deployment: uncomment the 'app' service below
  # and run: docker compose --profile deploy up -d
  #
  # Required: copy apps/api/.env.example to .env and fill in values first
  # At minimum set: JWT_SECRET, ENCRYPTION_MASTER_KEY
  app:
    build: .
    container_name: tasktoad-app
    profiles: ["deploy"]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tasktoad
      NODE_ENV: production
      PORT: "3001"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or environment}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?Set ENCRYPTION_MASTER_KEY in .env or environment}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TASKTOAD_LICENSE: ${TASKTOAD_LICENSE:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  tasktoad_postgres:
