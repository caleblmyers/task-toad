name: Deploy
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint

  # Railway auto-deploys on push to main when configured.
  # This workflow validates the build before Railway picks it up.
  # To enable Railway deploy hook, add RAILWAY_DEPLOY_WEBHOOK secret
  # and uncomment the deploy job below.
  #
  # deploy:
  #   needs: build-and-test
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Trigger Railway deploy
  #       run: curl -X POST "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}"
