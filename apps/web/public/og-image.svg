<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1B2631"/>
  <!-- Toad icon -->
  <g transform="translate(600, 240)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="60" ry="45" fill="#4CAF50"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="40" fill="#66BB6A"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-45" r="14" fill="#E8F5E9"/>
    <circle cx="18" cy="-45" r="14" fill="#E8F5E9"/>
    <circle cx="-16" cy="-44" r="7" fill="#1B2631"/>
    <circle cx="20" cy="-44" r="7" fill="#1B2631"/>
    <!-- Mouth -->
    <path d="M -20 -18 Q 0 -8 20 -18" stroke="#2E7D32" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="-35" cy="62" rx="18" ry="8" fill="#388E3C"/>
    <ellipse cx="35" cy="62" rx="18" ry="8" fill="#388E3C"/>
  </g>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#FFFFFF">TaskToad</text>
  <!-- Tagline -->
